<!-- @dsCard group="Brand" viewport="700x250" name="The advisor character" subtitle="Original emotive SVG mascot, states driven by backend events" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--paper);font-family:var(--font-body)}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:18px}
.cell{display:flex;flex-direction:column;align-items:center}
.cap{font-size:12px;font-weight:600;margin-top:2px}.sub{font-size:10.5px;color:var(--ink-3);font-family:var(--font-mono)}</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head><body><div id="root"></div>
<script type="text/jsx-src" id="src">
const NAVY='#27324C',CREAM='#ECE7DA',CREAM_HI='#F5F2E9',MINT='#A6E0BF',MINT_SH='#7FCBA0';
function cfg(mode){const M={
 idle:{eye:'open',brow:'calm',mouth:'smile',front:6,back:-4,glow:0,gaze:[0,0],blink:true},
 listening:{eye:'wide',brow:'raised',mouth:'smile',front:-96,back:-4,glow:1,gaze:[0,1.5],blink:true},
 thinking:{eye:'open',brow:'think',mouth:'o',front:-120,back:-4,glow:0,gaze:[-2,-3.5],dots:true},
 researching:{eye:'open',brow:'calm',mouth:'small',front:-58,back:-4,glow:0,gaze:[0,1],scan:true,doc:true},
 speaking:{eye:'happy',brow:'happy',mouth:'talk',front:-60,back:-4,glow:1,gaze:[0,0]},
 handoff:{eye:'happy',brow:'happy',mouth:'smile',front:-50,back:-4,glow:0,gaze:[0,0],handoff:true}};
 return M[mode]||M.idle;}
function Brow({side,type}){const cx=side==='l'?104:136,cy=127;const t={calm:{l:[0,0],r:[0,0]},raised:{l:[0,-4],r:[0,-4]},happy:{l:[-12,-3],r:[12,-3]},think:{l:[-15,-7],r:[5,0]}}[type][side];
 return <rect x={cx-8} y={cy-2} width="16" height="4" rx="2" fill={NAVY} style={{transform:`translateY(${t[1]}px) rotate(${t[0]}deg)`,transformOrigin:`${cx}px ${cy}px`,transition:'transform var(--dur-4) var(--ease-spring)'}}/>;}
function Eye({side,type,gaze,blink}){const cx=side==='l'?105:135,cy=142;
 if(type==='happy'){return <path d={`M${cx-6},${cy+1} Q${cx},${cy-6} ${cx+6},${cy+1}`} fill="none" stroke={NAVY} strokeWidth="3.6" strokeLinecap="round"/>;}
 const rx=type==='wide'?6:5.4,ry=type==='wide'?8:7;
 const g=<g style={{transform:`translate(${gaze[0]}px, ${gaze[1]}px)`,transition:'transform var(--dur-4) var(--ease-out)'}}><ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={NAVY}/><circle cx={cx-1.6} cy={cy-2.4} r="1.5" fill="#fff" opacity="0.9"/></g>;
 if(!blink) return g; return <g style={{animation:'tributo-blink 4.6s var(--ease-in-out) infinite',transformOrigin:`${cx}px ${cy}px`}}>{g}</g>;}
function Mouth({type}){const cx=120,cy=170;
 if(type==='smile')return <path d={`M${cx-15},${cy-2} Q${cx},${cy+11} ${cx+15},${cy-2}`} fill="none" stroke={NAVY} strokeWidth="3.6" strokeLinecap="round"/>;
 if(type==='small')return <path d={`M${cx-9},${cy-1} Q${cx},${cy+6} ${cx+9},${cy-1}`} fill="none" stroke={NAVY} strokeWidth="3.4" strokeLinecap="round"/>;
 if(type==='o')return <ellipse cx={cx} cy={cy+1} rx="5" ry="6.5" fill={NAVY}/>;
 return <g><ellipse cx={cx} cy={cy} rx="9" ry="9" fill={NAVY}/><ellipse cx={cx} cy={cy+2.5} rx="5" ry="3.6" fill="#7E3B4A" opacity="0.6"/></g>;}
function Arm({shoulder,angle,hand,back}){const[sx,sy]=shoulder;return <g style={{transform:`rotate(${angle}deg)`,transformOrigin:`${sx}px ${sy}px`,transition:'transform var(--dur-4) var(--ease-spring)'}}><path d={`M${sx},${sy} q${back?-10:10},26 ${back?-2:2},46`} fill="none" stroke={NAVY} strokeWidth="10.5" strokeLinecap="round"/>{hand&&<circle cx={sx+(back?-2:2)} cy={sy+46} r="6.5" fill={NAVY}/>}</g>;}
function Advisor({mode,size=126}){const c=cfg(mode);
 const bob=mode==='speaking'?'tributo-breathe 1.1s var(--ease-in-out) infinite':mode==='thinking'?'tributo-sway 3.4s var(--ease-in-out) infinite':'tributo-breathe 4s var(--ease-in-out) infinite';
 return <div style={{position:'relative',width:size,height:size}}>{c.glow>0&&<span style={{position:'absolute',left:'50%',top:'52%',width:'72%',height:'72%',transform:'translate(-50%,-50%)',borderRadius:'50%',background:`radial-gradient(circle, rgba(34,194,129,${.28*c.glow}) 0%, rgba(34,194,129,0) 64%)`,animation:'tributo-pulse-glow 1.9s ease-out infinite'}}/>}
 <svg viewBox="0 0 240 300" width={size} height={size} style={{overflow:'visible',filter:'drop-shadow(0 12px 16px rgba(13,33,67,0.14))'}}>
 <ellipse cx="120" cy="276" rx="58" ry="11" fill="#0D2143" opacity="0.10"/>
 <g style={{animation:bob,transformOrigin:'120px 276px'}}>
 <Arm shoulder={[74,156]} angle={c.back} hand={false} back/>
 <rect x="66" y="84" width="108" height="150" rx="26" fill={CREAM}/><rect x="66" y="84" width="108" height="60" rx="26" fill={CREAM_HI} opacity="0.6"/>
 <path d="M150 84 L174 84 L174 108 Z" fill={MINT}/><path d="M150 84 L150 108 L174 108 Z" fill={MINT_SH} opacity="0.85"/>
 <g><Brow side="l" type={c.brow}/><Brow side="r" type={c.brow}/>
 <g style={c.scan?{animation:'tributo-scan 1.5s var(--ease-in-out) infinite'}:undefined}><Eye side="l" type={c.eye} gaze={c.gaze} blink={c.blink}/><Eye side="r" type={c.eye} gaze={c.gaze} blink={c.blink}/></g>
 <Mouth type={c.mouth}/></g>
 <path d="M80 158 L166 212" stroke={NAVY} strokeWidth="9" strokeLinecap="round" fill="none" opacity="0.92"/>
 <rect x="150" y="190" width="36" height="32" rx="9" fill={NAVY}/><rect x="150" y="190" width="36" height="12" rx="6" fill="#1B2438"/><circle cx="168" cy="208" r="3.4" fill={MINT}/>
 <Arm shoulder={[166,156]} angle={c.front} hand/>
 {c.doc&&<g><rect x="150" y="150" width="30" height="38" rx="4" fill="#fff" stroke="#D9D3C4" strokeWidth="1.5" transform="rotate(8 165 169)"/><line x1="156" y1="160" x2="174" y2="162" stroke="#C7C0AE" strokeWidth="2" transform="rotate(8 165 169)"/><line x1="155" y1="167" x2="173" y2="169" stroke="#C7C0AE" strokeWidth="2" transform="rotate(8 165 169)"/></g>}
 {c.dots&&<g>{[0,1,2].map(i=><circle key={i} cx={150+i*13} cy={68-i*2} r="4" fill={NAVY} style={{animation:`tributo-thinkdot 1.3s var(--ease-in-out) ${i*.18}s infinite`}}/>)}</g>}
 {c.handoff&&<g transform="translate(184 150)"><rect x="-6" y="-16" width="58" height="34" rx="17" fill="#fff" stroke="#E3DDD1" strokeWidth="1.5"/><circle cx="10" cy="-2" r="6" fill="none" stroke={NAVY} strokeWidth="2.4"/><path d="M1 12 a9 9 0 0 1 18 0" fill="none" stroke={NAVY} strokeWidth="2.4" strokeLinecap="round"/><path d="M26 1 h16 m-6 -5 l6 5 l-6 5" fill="none" stroke="#0C8B57" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></g>}
 </g></svg></div>;}
const STATES=[['idle','idle / done'],['listening','listening'],['thinking','plan'],['researching','retrieval'],['speaking','token'],['handoff','escalation']];
ReactDOM.createRoot(document.getElementById('root')).render(<div className="grid">{STATES.map(([m,s])=><div key={m} className="cell"><Advisor mode={m}/><span className="cap" style={{color:(m==='listening'||m==='speaking')?'var(--signal-700)':'var(--ink)'}}>{m}</span><span className="sub">{s}</span></div>)}</div>);
</script>
<script>(function(){function b(){var s=document.getElementById('src').textContent;var o=Babel.transform(s,{presets:[[Babel.availablePresets.react,{runtime:'classic'}]]}).code;(0,eval)(o);}if(document.readyState!=='loading')b();else document.addEventListener('DOMContentLoaded',b);})();</script>
</body></html>
