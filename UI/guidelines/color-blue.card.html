<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body)}
  .row{display:flex;gap:0;padding:20px}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
  .sw span{font-family:var(--font-mono);font-size:11px;line-height:1.3}
  .sw b{font-size:12px;font-weight:600;font-family:var(--font-body)}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--blue-50)"><b style="color:#16191F">50</b><span style="color:#3B434F">#EAF1FB</span></div>
    <div class="sw" style="background:var(--blue-100)"><b style="color:#16191F">100</b><span style="color:#3B434F">#CFE0F5</span></div>
    <div class="sw" style="background:var(--blue-300)"><b style="color:#16191F">300</b><span style="color:#16191F">#6F9FE0</span></div>
    <div class="sw" style="background:var(--blue-500)"><b style="color:#fff">500</b><span style="color:#EAF1FB">#1F5EC4</span></div>
    <div class="sw" style="background:var(--blue-600)"><b style="color:#fff">600</b><span style="color:#EAF1FB">#1A4DA2</span></div>
    <div class="sw" style="background:var(--blue-700)"><b style="color:#fff">700</b><span style="color:#CFE0F5">#163F84</span></div>
    <div class="sw" style="background:var(--blue-900)"><b style="color:#fff">900</b><span style="color:#A6C5EC">#0D2143</span></div>
  </div>
</body></html>
