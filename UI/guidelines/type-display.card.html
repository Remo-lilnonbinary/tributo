<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-heading);padding:22px}
  .d1{font-size:48px;line-height:1.05;font-weight:800;letter-spacing:-.02em;margin:0}
  .h2{font-size:28px;line-height:1.2;font-weight:700;letter-spacing:-.01em;margin:10px 0 0}
  .h4{font-size:18px;line-height:1.3;font-weight:600;margin:8px 0 0;color:var(--ink-2)}
  small{font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
</style></head><body>
  <p class="d1">Your private tax advisor</p>
  <p class="h2">Do I need to file a Self Assessment?</p>
  <p class="h4">Hanken Grotesk · 800 / 700 / 600</p>
  <small>display-1 56 · h2 28 · h4 18, tracking −0.02 to −0.01em</small>
</body></html>
