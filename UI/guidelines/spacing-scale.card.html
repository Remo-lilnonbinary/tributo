<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);padding:22px}
  .row{display:flex;align-items:flex-end;gap:10px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--blue-500);border-radius:3px;width:22px}
  .col span{font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
</style></head><body>
  <div class="row">
    <div class="col"><div class="bar" style="height:4px"></div><span>1·4</span></div>
    <div class="col"><div class="bar" style="height:8px"></div><span>2·8</span></div>
    <div class="col"><div class="bar" style="height:12px"></div><span>3·12</span></div>
    <div class="col"><div class="bar" style="height:16px"></div><span>4·16</span></div>
    <div class="col"><div class="bar" style="height:24px"></div><span>6·24</span></div>
    <div class="col"><div class="bar" style="height:32px"></div><span>7·32</span></div>
    <div class="col"><div class="bar" style="height:48px"></div><span>9·48</span></div>
    <div class="col"><div class="bar" style="height:64px"></div><span>10·64</span></div>
    <div class="col"><div class="bar" style="height:80px"></div><span>11·80</span></div>
  </div>
</body></html>
