<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body)}
  .grid{display:grid;grid-template-columns:1fr 1fr;height:180px}
  .cell{display:flex;align-items:center;gap:18px;padding:0 26px}
  .light{background:var(--paper)}
  .dark{background:var(--blue-900)}
  .wm{font-family:var(--font-heading);font-weight:800;font-size:34px;letter-spacing:-.02em}
</style></head><body>
  <div class="grid">
    <div class="cell light">
      <img src="../assets/tributo-mark.svg" width="64" height="64" alt="">
      <span class="wm" style="color:var(--ink)">Tributo</span>
    </div>
    <div class="cell dark">
      <img src="../assets/tributo-mark.svg" width="56" height="56" alt="">
      <span class="wm" style="color:var(--paper)">Tributo</span>
    </div>
  </div>
</body></html>
