<!-- @dsCard group="Colors" viewport="700x170" name="Signal, the one warm accent" subtitle="Reserved for LIVE / active / action only" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body);color:var(--ink)}
  .wrap{padding:20px}
  .row{display:flex;gap:0}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box}
  .sw span{font-family:var(--font-mono);font-size:11px}.sw b{font-size:12px;font-weight:600}
  .note{margin-top:12px;font-size:13px;color:var(--ink-3);display:flex;align-items:center;gap:10px}
  .glow{width:18px;height:18px;border-radius:999px;background:var(--signal-glow);box-shadow:var(--glow-signal)}
</style></head><body>
  <div class="wrap">
    <div class="row">
      <div class="sw" style="background:var(--signal-50)"><b>50</b><span style="color:#075C3A">#EBF8F1</span></div>
      <div class="sw" style="background:var(--signal-100)"><b>100</b><span style="color:#075C3A">#D8F1E5</span></div>
      <div class="sw" style="background:var(--signal-glow)"><b>glow</b><span style="color:#075C3A">#22C281</span></div>
      <div class="sw" style="background:var(--signal)"><b style="color:#fff">signal</b><span style="color:#D8F1E5">#0C8B57</span></div>
      <div class="sw" style="background:var(--signal-600)"><b style="color:#fff">600</b><span style="color:#D8F1E5">#0A7449</span></div>
      <div class="sw" style="background:var(--signal-700)"><b style="color:#fff">700</b><span style="color:#D8F1E5">#075C3A</span></div>
    </div>
    <div class="note"><span class="glow"></span> Glow is elevation reserved for living elements, the advisor, the listening mic, streaming answers.</div>
  </div>
</body></html>
