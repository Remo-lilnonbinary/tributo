<!-- @dsCard group="Colors" viewport="700x150" name="Paper & ink" subtitle="Warm off-white surfaces, warm neutrals, deep ink text" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);font-family:var(--font-body)}
  .row{display:flex;gap:0;padding:20px}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border-right:1px solid rgba(0,0,0,.04)}
  .sw span{font-family:var(--font-mono);font-size:11px;line-height:1.3}
  .sw b{font-size:12px;font-weight:600;font-family:var(--font-body)}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--white)"><b>White</b><span style="color:#5E6775">#FFFFFF</span></div>
    <div class="sw" style="background:var(--paper)"><b>Paper</b><span style="color:#5E6775">#FBFAF6</span></div>
    <div class="sw" style="background:var(--paper-2)"><b>Paper 2</b><span style="color:#5E6775">#F4F1EA</span></div>
    <div class="sw" style="background:var(--paper-3)"><b>Paper 3</b><span style="color:#5E6775">#ECE7DD</span></div>
    <div class="sw" style="background:var(--line-2)"><b>Line</b><span style="color:#3B434F">#D4CCBC</span></div>
    <div class="sw" style="background:var(--ink-3)"><b style="color:#fff">Ink 3</b><span style="color:#E5DFD3">#5E6775</span></div>
    <div class="sw" style="background:var(--ink)"><b style="color:#fff">Ink</b><span style="color:#B7AE9C">#16191F</span></div>
  </div>
</body></html>
