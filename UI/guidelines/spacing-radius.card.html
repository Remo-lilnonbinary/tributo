<!-- @dsCard group="Spacing" viewport="700x180" name="Radius & elevation" subtitle="Citizen rounded · console sharp · soft warm shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);padding:22px}
  .row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
  .box{width:84px;height:64px;background:var(--white);display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;box-sizing:border-box}
  .box span{font-family:var(--font-mono);font-size:11px;color:var(--ink-3)}
  .lbl{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);margin-top:6px;text-align:center}
  .col{display:flex;flex-direction:column;align-items:center}
</style></head><body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-console);box-shadow:var(--ring-line)"><span>6</span></div><div class="lbl">console</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--ring-line)"><span>14</span></div><div class="lbl">card</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-card)"><span>20</span></div><div class="lbl">citizen</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-xl);box-shadow:var(--shadow-lg)"><span>28</span></div><div class="lbl">raised</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill);box-shadow:var(--glow-signal);background:var(--signal-50)"><span style="color:var(--signal-700)">pill</span></div><div class="lbl">live/glow</div></div>
  </div>
</body></html>
