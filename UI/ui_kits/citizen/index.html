/* ---------- icons (lucide via createElement-free svg helper) ---------- */
function Icon({name, size=20, color='currentColor', stroke=1.75, style}){
  const ref = useRef(null);
  useEffect(()=>{ if(ref.current && window.lucide){ ref.current.innerHTML=''; const el=document.createElement('i'); el.setAttribute('data-lucide',name); ref.current.appendChild(el); window.lucide.createIcons({attrs:{width:size,height:size,stroke:color,'stroke-width':stroke}, nameAttr:'data-lucide'}); }},[name,size,color,stroke]);
  return <span ref={ref} aria-hidden="true" style={{display:'inline-flex',width:size,height:size,...style}}/>;
}

function Eye({side,type,gaze,blink}){const cx=side==='l'?105:135,cy=142;
 if(type==='happy'||type==='closed'){const d=type==='happy'?`M${cx-6},${cy+1} Q${cx},${cy-6} ${cx+6},${cy+1}`:`M${cx-6},${cy-1} Q${cx},${cy+4} ${cx+6},${cy-1}`;return <path d={d} fill="none" stroke={NAVY} strokeWidth="3.6" strokeLinecap="round"/>;}
 const rx=type==='wide'?6:5.4,ry=type==='wide'?8:7;
 const g=<g style={{transform:`translate(${gaze[0]}px, ${gaze[1]}px)`,transition:'transform var(--dur-4) var(--ease-out)'}}><ellipse cx={cx} cy={cy} rx={rx} ry={ry} fill={NAVY}/><circle cx={cx-1.6} cy={cy-2.4} r="1.5" fill="#fff" opacity="0.9"/></g>;
 if(!blink) return g; return <g style={{animation:'tributo-blink 4.6s var(--ease-in-out) infinite',transformOrigin:`${cx}px ${cy}px`}}>{g}</g>;}
function Mouth({type,talkLevel}){const cx=120,cy=170;
 if(type==='smile')return <path d={`M${cx-15},${cy-2} Q${cx},${cy+11} ${cx+15},${cy-2}`} fill="none" stroke={NAVY} strokeWidth="3.6" strokeLinecap="round"/>;
 if(type==='frown')return <path d={`M${cx-13},${cy+5} Q${cx},${cy-6} ${cx+13},${cy+5}`} fill="none" stroke={NAVY} strokeWidth="3.6" strokeLinecap="round"/>;
 if(type==='flat')return <line x1={cx-12} y1={cy} x2={cx+12} y2={cy} stroke={NAVY} strokeWidth="3.6" strokeLinecap="round"/>;
 if(type==='small')return <path d={`M${cx-9},${cy-1} Q${cx},${cy+6} ${cx+9},${cy-1}`} fill="none" stroke={NAVY} strokeWidth="3.4" strokeLinecap="round"/>;
 if(type==='o')return <ellipse cx={cx} cy={cy+1} rx="5" ry="6.5" fill={NAVY}/>;
 const ry=3+Math.max(0,Math.min(1,talkLevel))*8;return <g><ellipse cx={cx} cy={cy} rx="9" ry={ry} fill={NAVY}/><ellipse cx={cx} cy={cy+ry*.28} rx="5" ry={ry*.4} fill="#7E3B4A" opacity="0.6"/></g>;}

 return <div style={{position:'relative',width:size,height:size}}>{c.glow>0&&<span style={{position:'absolute',left:'50%',top:'52%',width:'72%',height:'72%',transform:'translate(-50%,-50%)',borderRadius:'50%',background:`radial-gradient(circle, rgba(34,194,129,${.28*c.glow}) 0%, rgba(34,194,129,0) 64%)`,animation:'tributo-pulse-glow 1.9s ease-out infinite'}}/>}

 {c.dots&&<g>{[0,1,2].map(i=><circle key={i} cx={150+i*13} cy={68-i*2} r="4" fill={NAVY} style={{animation:`tributo-thinkdot 1.3s var(--ease-in-out) ${i*.18}s infinite`}}/>)}</g>}
 {c.shield&&<g><path d="M120 96 C150 104 158 120 158 150 C158 186 142 206 120 214 C98 206 82 186 82 150 C82 120 90 104 120 96 Z" fill="none" stroke={MINT_SH} strokeWidth="3" opacity="0.7"/><clipPath id="bc"><rect x="66" y="84" width="108" height="150" rx="26"/></clipPath><rect x="40" y="84" width="60" height="150" fill="rgba(166,224,191,0.55)" clipPath="url(#bc)" style={{animation:'tributo-shield-sweep 1.1s var(--ease-in-out) infinite'}}/></g>}
 {c.handoff&&<g transform="translate(184 150)" style={{animation:'tributo-rise var(--dur-4) var(--ease-out) both'}}><rect x="-6" y="-16" width="58" height="34" rx="17" fill="#fff" stroke="#E3DDD1" strokeWidth="1.5"/><circle cx="10" cy="-2" r="6" fill="none" stroke={NAVY} strokeWidth="2.4"/><path d="M1 12 a9 9 0 0 1 18 0" fill="none" stroke={NAVY} strokeWidth="2.4" strokeLinecap="round"/><path d="M26 1 h16 m-6 -5 l6 5 l-6 5" fill="none" stroke="#0C8B57" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></g>}
 </g></svg></div>;}
function Badge({tone='neutral',dot,children}){
  const t={neutral:['var(--paper-3)','var(--ink-2)','var(--ink-3)'],grounded:['var(--confidence-grounded-bg)','var(--confidence-grounded)','var(--confidence-grounded)'],escalated:['var(--confidence-escalated-bg)','var(--confidence-escalated)','var(--confidence-escalated)'],redaction:['var(--redaction-bg)','var(--redaction)','var(--redaction)'],live:['var(--signal-100)','var(--signal-700)','var(--signal-glow)'],info:['var(--info-bg)','var(--blue-700)','var(--blue-500)']}[tone];
  return <span style={{display:'inline-flex',alignItems:'center',gap:7,background:t[0],color:t[1],fontWeight:600,fontSize:13,lineHeight:1.2,padding:'5px 12px',borderRadius:999,whiteSpace:'nowrap'}}>{dot&&<span style={{width:8,height:8,borderRadius:99,background:t[2],boxShadow:tone==='live'?'0 0 0 3px rgba(34,194,129,.25)':'none',animation:tone==='live'?'tributo-pulse-glow 1.8s ease-out infinite':'none'}}/>}{children}</span>;
}
function Btn({variant='primary',size='md',shape='pill',iconLeft,iconRight,children,onClick,disabled,style,full}){
  const sz={sm:{fs:14,p:'8px 14px',mh:36},md:{fs:16,p:'12px 20px',mh:46},lg:{fs:18,p:'15px 26px',mh:56}}[size];
  const v={primary:{background:'var(--signal)',color:'#fff'},secondary:{background:'var(--white)',color:'var(--ink)',border:'1px solid var(--line-2)'},ghost:{background:'transparent',color:'var(--blue-600)'},quiet:{background:'var(--paper-2)',color:'var(--ink)'}}[variant];
  const hb={primary:'var(--signal-600)',secondary:'var(--paper-2)',ghost:'var(--blue-50)',quiet:'var(--paper-3)'}[variant];
  return <button onClick={onClick} disabled={disabled} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',gap:9,fontFamily:'var(--font-heading)',fontWeight:600,fontSize:sz.fs,minHeight:sz.mh,padding:sz.p,borderRadius:shape==='sharp'?'var(--radius-console)':999,border:'1px solid transparent',cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,width:full?'100%':'auto',transition:'background var(--dur-2),transform var(--dur-1)',...v,...style}}
    onMouseEnter={e=>!disabled&&(e.currentTarget.style.background=hb)} onMouseLeave={e=>!disabled&&(e.currentTarget.style.background=v.background)} onMouseDown={e=>!disabled&&(e.currentTarget.style.transform='scale(.98)')} onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}>
    {iconLeft}{children}{iconRight}</button>;
}
function CitationChip({kind='source',provenance='govuk',label,value,sourceRef,index,onClick}){
  const prov={govuk:['var(--blue-700)','var(--blue-50)','var(--blue-100)','GOV.UK'],hmrc:['var(--blue-800)','var(--blue-50)','var(--blue-100)','HMRC'],legislation:['var(--ink)','var(--paper-3)','var(--line-2)','Legislation']}[provenance];
  if(kind==='fact') return <span style={{display:'inline-flex',alignItems:'baseline',gap:7,background:'var(--white)',border:'1px solid var(--line-2)',borderRadius:'var(--radius-sm)',padding:'4px 10px',fontFamily:'var(--font-mono)',fontSize:13.5,fontWeight:600,boxShadow:'var(--shadow-xs)',whiteSpace:'nowrap'}}>{value}{sourceRef&&<sup style={{fontSize:10,color:'var(--blue-600)',fontWeight:700}}>{sourceRef}</sup>}</span>;

    {index!=null&&<span style={{width:20,height:20,borderRadius:99,background:prov[0],color:prov[1],fontFamily:'var(--font-mono)',fontSize:11,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',flex:'0 0 auto'}}>{index}</span>}

function RedactionChip({type,token,count=1}){

}
function ConfidenceMeter({value,floor=75,caption}){
  const g=value>=floor, c=g?'var(--confidence-grounded)':'var(--confidence-escalated)', tk=g?'var(--confidence-grounded-bg)':'var(--confidence-escalated-bg)';
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:7}}>
      <span style={{fontSize:15,fontWeight:600}}>Confidence</span>
      <span style={{display:'inline-flex',gap:6,alignItems:'baseline'}}><span style={{fontFamily:'var(--font-mono)',fontWeight:600,fontSize:17,color:c}}>{value}%</span><span style={{fontSize:12,fontWeight:700,color:c,textTransform:'uppercase',letterSpacing:'.04em'}}>{g?'Grounded':'Escalated'}</span></span>
    </div>
    <div style={{position:'relative',height:12,background:tk,borderRadius:99,overflow:'hidden'}}><div style={{position:'absolute',inset:0,width:`${value}%`,background:c,transition:'width var(--dur-4) var(--ease-out)'}}/><div style={{position:'absolute',top:-2,bottom:-2,left:`${floor}%`,width:2,background:'var(--ink)',opacity:.55}}/></div>
    <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}><span style={{fontSize:13,color:'var(--ink-3)'}}>{caption}</span><span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--ink-4)'}}>floor {floor}%</span></div>
  </div>;
}
function ReasoningTrace({steps}){
  const ss={pending:['var(--line-strong)',.55],active:['var(--signal-glow)',1],done:['var(--confidence-grounded)',1]};
  return <ol style={{listStyle:'none',margin:0,padding:0}}>{steps.map((s,i)=>{const st=ss[s.state||'pending'],last=i===steps.length-1;return(
    <li key={i} style={{display:'grid',gridTemplateColumns:'24px 1fr',gap:12,animation:'tributo-rise var(--dur-3) var(--ease-out) both',animationDelay:`${i*70}ms`}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}><span style={{width:13,height:13,borderRadius:99,background:st[0],marginTop:3,boxShadow:s.state==='active'?'0 0 0 4px rgba(34,194,129,.22)':'none',animation:s.state==='active'?'tributo-pulse-glow 1.8s ease-out infinite':'none'}}/>{!last&&<span style={{width:2,flex:1,background:'var(--line)',marginTop:4,minHeight:18}}/>}</div>
      <div style={{paddingBottom:last?0:18,opacity:st[1]}}>
        {s.planner&&<span style={{fontFamily:'var(--font-mono)',fontSize:10.5,fontWeight:600,color:'var(--blue-700)',background:'var(--blue-50)',borderRadius:5,padding:'1px 7px'}}>{s.planner}</span>}
        <div style={{fontSize:15.5,fontWeight:600,lineHeight:1.4,margin:'7px 0 0'}}>{s.question}</div>
        {(s.coverage!=null)&&<div style={{display:'flex',gap:14,marginTop:8,flexWrap:'wrap',alignItems:'center'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}><div style={{width:64,height:6,background:'var(--paper-3)',borderRadius:99,overflow:'hidden'}}><div style={{width:`${s.coverage}%`,height:'100%',background:'var(--confidence-grounded)',transition:'width var(--dur-4) var(--ease-out)'}}/></div><span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--ink-2)'}}>{s.coverage}% coverage</span></div>
          <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--ink-3)'}}>{s.sources} sources</span><span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--ink-3)'}}>{s.facts} facts</span>
        </div>}
      </div>
    </li>);})}</ol>;
}

    doc:{title:'Tax on foreign income',sub:'GOV.UK · HM Revenue & Customs',url:'gov.uk/tax-foreign-income',
      body:[
        {h:'If you’re taxed twice'},
        {p:'You may be taxed on your foreign income by the UK and by the country where your income is from.'},
        {mark:'You can usually claim tax relief to get some or all of this tax back. How you claim depends on whether your foreign income has already been taxed.'},
        {p:'Report foreign property income on the SA106 supplementary pages of your Self Assessment return.'},
      ]},
  },
};

/* ---------- main app ---------- */
const PHASE_MODE={idle:'idle',listening:'listening',redaction:'shielding',plan:'thinking',retrieval:'researching',meta:'consolidating',actions:'handingOver',speaking:'speaking',handoff:'handingOver',done:'idle',error:'error'};
const QUICK=[{k:'grounded',label:'Self Assessment',icon:'file-text'},{k:'grounded',label:'Redaction demo',icon:'shield-check'},{k:'escalation',label:'Escalation',icon:'user-round'},{k:'grounded',label:'Multi-part question',icon:'list-checks'}];

function App(){
  const [phase,setPhase]=useState('idle');
  const [listening,setListening]=useState(false);
  const [input,setInput]=useState('');
  const [scenarioKey,setScenarioKey]=useState('grounded');
  const [transcript,setTranscript]=useState([]);
  const [drawerOpen,setDrawerOpen]=useState(false);
  const [tab,setTab]=useState('document');
  const [reveal,setReveal]=useState({redactions:false,steps:0,stepStates:[],meta:false,actions:false});
  const [streamed,setStreamed]=useState('');
  const [planTicks,setPlanTicks]=useState({});
  const [talk,setTalk]=useState(.5);
  const timers=useRef([]);
  const sc=SCENARIOS[scenarioKey];
  const answered=['actions','speaking','done'].includes(phase);

  const clearTimers=()=>{timers.current.forEach(clearTimeout);timers.current=[];};
  const after=(ms,fn)=>{const id=setTimeout(fn,ms);timers.current.push(id);return id;};

  useEffect(()=>()=>clearTimers(),[]);
  useEffect(()=>{ try{const t=JSON.parse(localStorage.getItem('tributo_plan_ticks')||'{}');setPlanTicks(t);}catch(e){} },[]);
  const togglePlan=(i)=>setPlanTicks(p=>{const n={...p,[i]:!p[i]};try{localStorage.setItem('tributo_plan_ticks',JSON.stringify(n));}catch(e){}return n;});

  const run=useCallback((key)=>{
    clearTimers();
    const s=SCENARIOS[key];
    setScenarioKey(key); setListening(false);
    setTranscript(t=>[...t,{role:'you',text:s.question}]);
    setReveal({redactions:false,steps:0,stepStates:s.steps.map(()=>'pending'),meta:false,actions:false});
    setStreamed(''); 
    // a) redaction
    setPhase('redaction'); setTab('privacy');
    after(900,()=>setReveal(r=>({...r,redactions:true})));
    // b) plan
    after(1600,()=>{ setPhase('plan'); setReveal(r=>({...r,steps:s.steps.length})); });
    // c) retrieval (one per sub-question)
    s.steps.forEach((_,i)=>{
      after(2300+i*900,()=>{ setPhase('retrieval'); setReveal(r=>{const st=[...r.stepStates];st[i]='active';return{...r,stepStates:st};}); });
      after(2300+i*900+650,()=>setReveal(r=>{const st=[...r.stepStates];st[i]='done';return{...r,stepStates:st};}));
    });
    const tEnd=2300+s.steps.length*900;
    // d) meta
    after(tEnd+200,()=>{ setPhase('meta'); setReveal(r=>({...r,meta:true})); });
    // e) actions
    after(tEnd+1100,()=>{ setPhase('actions'); setReveal(r=>({...r,actions:true})); });
    // f) token streamed
    after(tEnd+1700,()=>{
      setPhase(s.escalate?'handoff':'speaking');
      const words=s.answer.split(' '); let i=0;
      const tick=()=>{ i++; setStreamed(words.slice(0,i).join(' ')); setTalk(.3+Math.random()*.6);
        if(i<words.length) after(45+Math.random()*45,tick);
        else { setTranscript(t=>[...t,{role:'advisor',text:s.answer}]);
          // g) done
          after(500,()=>{ setPhase('done'); setTab('document'); }); }
      };
      tick();
    });
  },[]);

  const onMic=()=>{
    if(phase!=='idle'&&phase!=='done'&&phase!=='listening') return;
    if(listening){ setListening(false); setPhase('idle'); setInput(SCENARIOS[scenarioKey].question); }
    else { setListening(true); setPhase('listening'); }
  };
  const onSend=()=>{ if(!input.trim()&&phase==='idle'){return;} run(scenarioKey); setInput(''); };

  const mode=listening?'listening':PHASE_MODE[phase];
  const statusText={idle:'Ask me anything about your tax. Speak or type.',listening:'Listening…',redaction:'Removing your personal details before anything is sent…',plan:'Planning how to answer…',retrieval:'Researching across trusted sources…',meta:'Gathering sources and confirming the figures…',actions:'Preparing your action plan…',speaking:'Answering now…',handoff:"Let's get you a human. I'm sharing everything I found, privately.",done:'Done. The source I used is open on the right.',error:"Something went wrong, your answer wasn't sent anywhere."}[phase];

  return (
    <div className="app">
      {/* header */}
      <header style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 24px',borderBottom:'1px solid var(--line)',background:'var(--paper)',zIndex:5}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <img src="../../assets/tributo-mark.svg" width="34" height="34" alt=""/>
          <span style={{fontFamily:'var(--font-heading)',fontWeight:800,fontSize:21,letterSpacing:'-.02em'}}>Tributo</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <button onClick={()=>setDrawerOpen(o=>!o)} style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--white)',border:'1px solid var(--line-2)',borderRadius:999,padding:'8px 14px',fontSize:14,fontWeight:600,cursor:'pointer'}}><Icon name="messages-square" size={17}/>Transcript {transcript.length>0&&<span style={{fontFamily:'var(--font-mono)',color:'var(--ink-3)'}}>{transcript.length}</span>}</button>
          <span style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:14,color:'var(--ink-2)'}}><Icon name="shield-check" size={18} color="var(--signal-700)"/>On-device redaction on</span>
        </div>
      </header>

      <div style={{flex:1,display:'flex',minHeight:0}}>
        {/* centre stage */}
        <main className="scrolly" style={{flex:1,minWidth:0,overflowY:'auto',padding:'28px 32px 0',display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div style={{width:'100%',maxWidth:680,display:'flex',flexDirection:'column',alignItems:'center'}}>
            <AdvisorAvatar mode={mode} size={216} talkLevel={talk}/>
            <p role="status" aria-live="polite" style={{fontFamily:'var(--font-heading)',fontWeight:600,fontSize:20,lineHeight:1.35,textAlign:'center',margin:'18px 0 0',color:phase==='idle'?'var(--ink-2)':'var(--ink)',maxWidth:520}}>{statusText}</p>

            {/* streamed / final answer */}
            {(phase==='speaking'||phase==='handoff'||phase==='done')&&(
              <div style={{marginTop:22,width:'100%',background:'var(--white)',borderRadius:'var(--radius-lg)',boxShadow:'var(--shadow-card)',padding:'24px 26px'}}>
                {sc.escalate&&<div style={{display:'flex',alignItems:'center',gap:10,background:'var(--confidence-escalated-bg)',border:'1px solid rgba(181,114,26,.25)',borderRadius:'var(--radius-md)',padding:'12px 14px',marginBottom:16}}><Icon name="user-round" size={20} color="var(--confidence-escalated)"/><div><div style={{fontWeight:700,fontSize:15,color:'var(--confidence-escalated)'}}>Getting you a human</div><div style={{fontSize:13.5,color:'var(--ink-2)'}}>This needs a person to confirm. A human adviser will pick it up with everything I found.</div></div></div>}
                <p style={{fontSize:19,lineHeight:1.6,margin:0}}>{(phase==='speaking'||phase==='handoff')?streamed:sc.answer}{(phase==='speaking'||phase==='handoff')&&<span style={{display:'inline-block',width:9,height:22,background:'var(--signal)',marginLeft:3,transform:'translateY(3px)',animation:'tributo-caret 1s steps(1) infinite'}}/>}</p>
                {reveal.meta&&(
                  <div style={{marginTop:18,display:'flex',flexWrap:'wrap',gap:10,alignItems:'center'}}>
                    <Badge tone={sc.confidence>=75?'grounded':'escalated'} dot>{sc.confidence>=75?'Grounded':'Needs a human'} · {sc.confidence}%</Badge>
                    <span style={{width:1,height:22,background:'var(--line)',margin:'0 2px'}}/>
                    {sc.facts.map((f,i)=><CitationChip key={i} kind="fact" value={f.value} sourceRef={f.ref}/>)}
                    <span style={{width:1,height:22,background:'var(--line)',margin:'0 2px'}}/>
                    {sc.citations.map((c,i)=><CitationChip key={i} kind="source" provenance={c.provenance} label={c.label} index={c.index} onClick={()=>setTab('document')}/>)}
                  </div>
                )}
              </div>
            )}

            {/* persistent action plan */}
            {reveal.actions&&(
              <section style={{marginTop:20,width:'100%',background:'var(--paper)',border:'1px solid var(--line)',borderRadius:'var(--radius-lg)',padding:'22px 24px',animation:'tributo-rise var(--dur-4) var(--ease-out) both'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                  <Icon name="list-checks" size={20} color="var(--blue-700)"/>
                  <h2 style={{fontFamily:'var(--font-heading)',fontSize:19,fontWeight:700,margin:0}}>Your action plan</h2>
                  <span style={{flex:1}}/><span style={{fontSize:13,color:'var(--ink-3)'}}>saved to this device</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:0}}>
                  {sc.plan.map((p,i)=>(
                    <div key={i} style={{display:'grid',gridTemplateColumns:'28px 1fr auto',gap:14,alignItems:'start',padding:'14px 0',borderTop:i?'1px solid var(--line)':'none'}}>
                      <button onClick={()=>togglePlan(scenarioKey+i)} aria-pressed={!!planTicks[scenarioKey+i]} style={{width:26,height:26,borderRadius:8,border:`2px solid ${planTicks[scenarioKey+i]?'var(--signal)':'var(--line-strong)'}`,background:planTicks[scenarioKey+i]?'var(--signal)':'var(--white)',cursor:'pointer',display:'grid',placeItems:'center',marginTop:1}}>{planTicks[scenarioKey+i]&&<Icon name="check" size={15} color="#fff" stroke={3}/>}</button>
                      <div><div style={{fontSize:16,fontWeight:600,textDecoration:planTicks[scenarioKey+i]?'line-through':'none',color:planTicks[scenarioKey+i]?'var(--ink-3)':'var(--ink)'}}>{p.text}</div><div style={{fontSize:13,color:'var(--ink-3)',marginTop:3,fontFamily:'var(--font-mono)'}}>{p.source}</div></div>
                      <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:13,fontWeight:600,color:'var(--blue-700)',background:'var(--blue-50)',padding:'5px 11px',borderRadius:999,whiteSpace:'nowrap'}}><Icon name="calendar-clock" size={15} color="var(--blue-700)"/>{p.due}</span>
                    </div>
                  ))}
                </div>
                {/* deadline timeline */}
                <div style={{marginTop:10,paddingTop:16,borderTop:'1px solid var(--line)'}}>
                  <div style={{position:'relative',height:4,background:'var(--paper-3)',borderRadius:99,margin:'18px 6px 8px'}}>
                    {sc.plan.map((p,i)=>(<span key={i} style={{position:'absolute',top:'50%',left:`${10+i*(80/Math.max(1,sc.plan.length-1))}%`,transform:'translate(-50%,-50%)',width:14,height:14,borderRadius:99,background:'var(--blue-600)',border:'3px solid var(--paper)'}}/>))}
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',fontFamily:'var(--font-mono)',fontSize:11.5,color:'var(--ink-3)',padding:'0 2px'}}>{sc.plan.map((p,i)=><span key={i}>{p.due}</span>)}</div>
                </div>
              </section>
            )}
            <div style={{height:24}}/>
          </div>
        </main>

        {/* right side panel */}
        <SidePanel tab={tab} setTab={setTab} sc={sc} reveal={reveal} phase={phase} scenarioKey={scenarioKey} run={run}/>
      </div>

      {/* composer */}
      <footer style={{borderTop:'1px solid var(--line)',background:'var(--paper)',padding:'16px 32px 20px'}}>
        <div style={{maxWidth:760,margin:'0 auto'}}>
          {phase==='idle'&&(
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14,justifyContent:'center'}}>
              {QUICK.map((q,i)=>(
                <button key={i} onClick={()=>{setScenarioKey(q.k);after(10,()=>run(q.k));}} style={{display:'inline-flex',alignItems:'center',gap:8,background:'var(--white)',border:'1px solid var(--line-2)',borderRadius:999,padding:'9px 15px',fontSize:14,fontWeight:500,cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.background='var(--paper-2)'} onMouseLeave={e=>e.currentTarget.style.background='var(--white)'}><Icon name={q.icon} size={16} color="var(--blue-600)"/>{q.label}</button>
              ))}
            </div>
          )}
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={onMic} aria-label={listening?'Stop listening':'Start voice input'} style={{flex:'0 0 auto',width:60,height:60,borderRadius:999,border:'none',cursor:'pointer',background:listening?'var(--signal)':'var(--blue-600)',color:'#fff',display:'grid',placeItems:'center',boxShadow:listening?'var(--glow-signal-lg)':'var(--shadow-card)',animation:listening?'tributo-pulse-glow 1.6s ease-out infinite':'none',transition:'background var(--dur-2)'}}>
              <Icon name={listening?'square':'mic'} size={listening?22:26} color="#fff" stroke={2}/>
            </button>
            <div style={{flex:1,display:'flex',alignItems:'center',gap:10,background:'var(--white)',border:`2px solid ${listening?'var(--signal)':'var(--line-strong)'}`,borderRadius:999,padding:'4px 6px 4px 20px',transition:'border-color var(--dur-2)'}}>
              {listening
                ? <div style={{flex:1,display:'flex',alignItems:'center',gap:4,height:48}}>{Array.from({length:28}).map((_,i)=><span key={i} style={{width:3,borderRadius:9,background:'var(--signal)',height:`${10+Math.abs(Math.sin(i*.6))*26}px`,animation:`tributo-breathe ${.5+i%5*.1}s ease-in-out infinite`}}/>)}<span style={{marginLeft:'auto',fontSize:14,color:'var(--signal-700)',fontWeight:600,paddingRight:8}}>Listening…</span></div>
                : <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&onSend()} placeholder="Ask about your tax, plain English is fine" style={{flex:1,border:0,outline:'none',background:'transparent',fontSize:17,fontFamily:'var(--font-body)',padding:'12px 0',color:'var(--ink)'}} disabled={!['idle','done'].includes(phase)}/>}
              <Btn variant="primary" onClick={onSend} disabled={!['idle','done'].includes(phase)||(!input.trim()&&!listening)} iconRight={<Icon name="arrow-up" size={20} color="#fff" stroke={2.2}/>} style={{minWidth:52,padding:'12px 16px'}}>{''}</Btn>
            </div>
            <button title="Speak answers aloud" style={{flex:'0 0 auto',display:'inline-flex',alignItems:'center',gap:8,background:'var(--white)',border:'1px solid var(--line-2)',borderRadius:999,padding:'12px 16px',fontSize:14,fontWeight:600,cursor:'pointer',color:'var(--ink-2)'}}><Icon name="volume-2" size={18} color="var(--signal-700)"/>Speak</button>
          </div>
          <p style={{textAlign:'center',fontSize:13,color:'var(--ink-3)',margin:'12px 0 0'}}>Your questions help improve this service privately. Your data never leaves your device.</p>
          <p style={{textAlign:'center',fontSize:12.5,color:'var(--ink-4)',margin:'5px 0 0'}}>Captions and a full transcript are always available. Personal details are removed on this device before anything is sent.</p>
        </div>
      </footer>

      {/* transcript drawer */}
      {drawerOpen&&(
        <>
          <div onClick={()=>setDrawerOpen(false)} style={{position:'fixed',inset:0,background:'var(--scrim)',zIndex:40}}/>
          <aside className="scrolly" style={{position:'fixed',top:0,right:0,bottom:0,width:400,background:'var(--paper)',borderLeft:'1px solid var(--line)',boxShadow:'var(--shadow-pop)',zIndex:41,padding:'22px 22px',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}><h2 style={{fontFamily:'var(--font-heading)',fontSize:20,fontWeight:700,margin:0}}>Transcript</h2><button onClick={()=>setDrawerOpen(false)} style={{background:'var(--white)',border:'1px solid var(--line-2)',borderRadius:999,width:36,height:36,cursor:'pointer',display:'grid',placeItems:'center'}}><Icon name="x" size={18}/></button></div>
            {transcript.length===0&&<p style={{color:'var(--ink-3)',fontSize:15}}>Your conversation will appear here, always available alongside voice.</p>}
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              {transcript.map((m,i)=>(
                <div key={i} style={{display:'flex',gap:10,flexDirection:m.role==='you'?'row-reverse':'row'}}>
                  <div style={{flex:'0 0 auto',width:30,height:30,borderRadius:99,background:m.role==='you'?'var(--paper-3)':'var(--signal-100)',display:'grid',placeItems:'center',fontFamily:'var(--font-heading)',fontWeight:700,fontSize:12,color:m.role==='you'?'var(--ink)':'var(--signal-700)'}}>{m.role==='you'?'You':'T'}</div>
                  <div style={{background:m.role==='you'?'var(--blue-600)':'var(--white)',color:m.role==='you'?'#fff':'var(--ink)',border:m.role==='you'?'none':'1px solid var(--line)',borderRadius:14,padding:'10px 14px',fontSize:15,lineHeight:1.45,maxWidth:260}}>{m.text}</div>
                </div>
              ))}
            </div>
          </aside>
        </>
      )}
    </div>
  );
}

/* ---------- right-hand tabbed side panel ---------- */
function SidePanel({tab,setTab,sc,reveal,phase,scenarioKey,run}){
  const tabs=[{k:'document',label:'Document',icon:'file-text'},{k:'privacy',label:'Privacy',icon:'shield-check'}];
  return (
    <aside style={{width:440,flex:'0 0 440px',borderLeft:'1px solid var(--line)',background:'var(--white)',display:'flex',flexDirection:'column',minHeight:0}}>
      <div role="tablist" style={{display:'flex',padding:'0 8px',borderBottom:'1px solid var(--line)',gap:2}}>
        {tabs.map(t=>{const on=tab===t.k;return(
          <button key={t.k} role="tab" aria-selected={on} onClick={()=>setTab(t.k)} style={{flex:1,display:'inline-flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 4px 10px',background:'transparent',border:'none',borderBottom:`3px solid ${on?'var(--blue-600)':'transparent'}`,cursor:'pointer',color:on?'var(--ink)':'var(--ink-3)',fontWeight:on?700:500,fontSize:12.5,fontFamily:'var(--font-body)'}} className="tab-underline">
            <Icon name={t.icon} size={19} color={on?'var(--blue-600)':'var(--ink-3)'}/>{t.label}
          </button>);})}
      </div>
      <div className="scrolly" style={{flex:1,overflowY:'auto',padding:'22px 22px'}}>
        {tab==='document'&&<DocumentTab sc={sc} ready={phase==='done'}/>}
        {tab==='privacy'&&<PrivacyTab sc={sc} reveal={reveal}/>}
      </div>
    </aside>
  );
}
function DocumentTab({sc,ready}){
  const d=sc.doc;
  if(!ready) return <Empty icon="file-text" title="The cited source opens here" body="When the advisor finishes, the exact GOV.UK or HMRC page it used appears here with the relevant passage highlighted."/>;
  return <div style={{animation:'tributo-rise var(--dur-4) var(--ease-out) both'}}>
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}><Badge tone="info" dot>Source · cited</Badge></div>
    <div style={{border:'1px solid var(--line)',borderRadius:'var(--radius-md)',overflow:'hidden'}}>
      <div style={{background:'#0b0c0c',color:'#fff',padding:'10px 14px',fontSize:13,display:'flex',alignItems:'center',gap:8}}><span style={{width:9,height:9,background:'#1d70b8',borderRadius:2}}/>GOV.UK</div>
      <div style={{padding:'18px 18px 22px'}}>
        <h3 style={{fontFamily:'var(--font-heading)',fontSize:23,fontWeight:800,margin:'0 0 4px',lineHeight:1.2}}>{d.title}</h3>
        <div style={{fontSize:12.5,color:'var(--ink-3)',fontFamily:'var(--font-mono)',marginBottom:16}}>{d.sub}</div>
        {d.body.map((b,i)=> b.h?<h4 key={i} style={{fontFamily:'var(--font-heading)',fontSize:17,fontWeight:700,margin:'14px 0 8px'}}>{b.h}</h4>
          : <p key={i} style={{fontSize:15.5,lineHeight:1.55,margin:'0 0 10px',color:'var(--ink-2)'}}>{b.mark?<mark>{b.mark}</mark>:b.p}</p>)}
      </div>
    </div>
    <a href="#" style={{display:'inline-flex',alignItems:'center',gap:7,marginTop:16,fontSize:14,fontWeight:600,color:'var(--blue-600)'}}><Icon name="external-link" size={16} color="var(--blue-600)"/>{d.url}</a>
  </div>;
}
function PrivacyTab({sc,reveal}){
  return <div>
    <h3 style={{fontFamily:'var(--font-heading)',fontSize:19,fontWeight:700,margin:'0 0 6px'}}>What leaves this device</h3>
    <p style={{fontSize:14.5,color:'var(--ink-2)',lineHeight:1.5,margin:'0 0 18px'}}>Your personal details are removed <strong>on this device</strong> before your question is sent. Here's exactly what was scrubbed and what went out.</p>
    {!reveal.redactions ? <Empty icon="shield-check" title="Nothing sent yet" body="Ask a question and the redaction ledger fills in here."/> : <>
      <div style={{fontSize:12,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink-3)',marginBottom:10}}>Removed before sending</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:22}}>{sc.redactions.map((r,i)=><RedactionChip key={i} {...r}/>)}</div>
      <div style={{fontSize:12,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink-3)',marginBottom:10}}>Redacted payload sent to the model</div>
      <pre style={{background:'var(--blue-900)',color:'#cfe0f5',borderRadius:'var(--radius-md)',padding:'16px',fontSize:12.5,fontFamily:'var(--font-mono)',lineHeight:1.6,overflowX:'auto',margin:0}}>{`POST /api/ask\n{\n  "q": "${sc.question.replace(/I /,'[NAME] ').slice(0,40)}…",\n  "redactions": ${sc.redactions.length},\n  "pii_left_device": false,\n  "model": "tributo-gov-uk-1"\n}`}</pre>
    </>}
  </div>;
}
function AccountabilityTab({sc}){
  return <div>
    <h3 style={{fontFamily:'var(--font-heading)',fontSize:19,fontWeight:700,margin:'0 0 14px'}}>Accountability</h3>
    <div style={{border:'1px solid var(--line)',borderRadius:'var(--radius-md)',padding:'14px 16px',marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--ink-3)',marginBottom:10}}>Audit record</div>
      {[['Time','2026-06-21 14:08 BST'],['Confidence',`${sc.confidence}% · ${sc.confidence>=75?'grounded':'escalated'}`],['Provider','tributo-gov-uk-1'],['Sources',`${sc.citations.length} cited`],['Redactions',`${sc.redactions.length} items`]].map((r,i)=>(
        <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderTop:i?'1px solid var(--line)':'none',fontSize:14}}><span style={{color:'var(--ink-3)'}}>{r[0]}</span><span style={{fontFamily:'var(--font-mono)',fontWeight:600}}>{r[1]}</span></div>
      ))}
    </div>
    <div style={{border:'1px solid var(--line)',borderRadius:'var(--radius-md)',padding:'14px 16px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><Icon name="scale" size={17} color="var(--blue-700)"/><span style={{fontWeight:700,fontSize:15}}>ATRS transparency record</span></div>
      <p style={{fontSize:14,color:'var(--ink-2)',lineHeight:1.5,margin:0}}>Published under the Algorithmic Transparency Recording Standard. Tier 1 + Tier 2 record available.</p>
    </div>
    <div style={{border:'1px solid var(--line)',borderRadius:'var(--radius-md)',padding:'14px 16px',marginBottom:16}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><Icon name="id-card" size={17} color="var(--blue-700)"/><span style={{fontWeight:700,fontSize:15}}>Model card</span></div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8}}><Badge tone="neutral">tributo-gov-uk-1</Badge><Badge tone="grounded" dot>retrieval-grounded</Badge><Badge tone="neutral">UK tax corpus</Badge></div>
    </div>
    <Btn variant="secondary" full iconLeft={<Icon name="download" size={18}/>}>Export this answer's record</Btn>
  </div>;
}
function FederatedTab(){
  const [state,setState]=useState('idle'); const [prog,setProg]=useState(0);
  const t=useRef([]);
  const start=()=>{ setState('running'); setProg(0); let p=0; const step=()=>{p+=8;setProg(Math.min(100,p)); if(p<100){t.current.push(setTimeout(step,160));} else setState('done');}; step(); };
  useEffect(()=>()=>t.current.forEach(clearTimeout),[]);
  return <div>
    <h3 style={{fontFamily:'var(--font-heading)',fontSize:19,fontWeight:700,margin:'0 0 6px'}}>Federated learning</h3>
    <p style={{fontSize:14.5,color:'var(--ink-2)',lineHeight:1.5,margin:'0 0 18px'}}>Improve the model from many devices without raw data ever leaving any of them. Run a round to see before vs after.</p>
    <div style={{display:'flex',gap:8,marginBottom:18}}>{['London','Leeds','Cardiff','Belfast'].map((n,i)=>(
      <div key={i} style={{flex:1,textAlign:'center',border:'1px solid var(--line)',borderRadius:'var(--radius-sm)',padding:'10px 4px'}}>
        <div style={{width:30,height:30,borderRadius:99,margin:'0 auto 6px',background:state==='idle'?'var(--paper-3)':'var(--signal-100)',display:'grid',placeItems:'center'}}><Icon name="server" size={16} color={state==='idle'?'var(--ink-3)':'var(--signal-700)'}/></div>
        <div style={{fontSize:12,fontWeight:600}}>{n}</div></div>))}</div>
    {state!=='idle'&&<div style={{height:8,background:'var(--paper-3)',borderRadius:99,overflow:'hidden',marginBottom:8}}><div style={{height:'100%',width:`${prog}%`,background:'var(--signal)',transition:'width .15s linear'}}/></div>}
    {state==='running'&&<p style={{fontFamily:'var(--font-mono)',fontSize:12.5,color:'var(--ink-3)',margin:'0 0 14px'}}>Aggregating gradients (FedAvg)… {prog}%</p>}
    {state==='done'&&(
      <div style={{margin:'6px 0 16px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}><Badge tone="grounded" dot>Round complete</Badge><span style={{fontSize:13,color:'var(--signal-700)',fontWeight:600,fontFamily:'var(--font-mono)'}}>0 raw rows left the building</span></div>
        {[['Before',91.4,'var(--federated-before)'],['After',94.2,'var(--federated-after)']].map((r,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}><span style={{width:46,fontSize:13,color:'var(--ink-3)'}}>{r[0]}</span><div style={{flex:1,height:14,background:'var(--paper-3)',borderRadius:99,overflow:'hidden'}}><div style={{height:'100%',width:`${r[1]}%`,background:r[2],transition:'width var(--dur-4)'}}/></div><span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:600,width:52,textAlign:'right'}}>{r[1]}%</span></div>
        ))}
      </div>
    )}
    <Btn variant="primary" full onClick={start} disabled={state==='running'} iconLeft={<Icon name="play" size={18} color="#fff"/>}>{state==='done'?'Run another round':'Run a federated round'}</Btn>
  </div>;
}
function Empty({icon,title,body}){
  return <div style={{textAlign:'center',padding:'42px 20px',color:'var(--ink-3)'}}>
    <div style={{width:54,height:54,borderRadius:16,background:'var(--paper-2)',display:'grid',placeItems:'center',margin:'0 auto 14px'}}><Icon name={icon} size={26} color="var(--ink-4)"/></div>
    <div style={{fontFamily:'var(--font-heading)',fontWeight:700,fontSize:16,color:'var(--ink-2)',marginBottom:6}}>{title}</div>
    <p style={{fontSize:14,lineHeight:1.5,maxWidth:260,margin:'0 auto'}}>{body}</p>
  </div>;
}
