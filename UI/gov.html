<!-- Tributo institution console — PRODUCTION. GOV.UK-styled operator dashboard, wired to the
     live backend (/api/metrics, /api/federated/run, /api/audit, /api/transparency,
     /api/model-card, /api/escalations, /api/settings). Served by FastAPI at /gov.html. -->
<!DOCTYPE html><html lang="en-GB"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tributo Console — GOV.UK</title>
<style>
  *{box-sizing:border-box}
  html{font-size:100%}
  body{margin:0;background:#fff;color:#0b0c0c;font-family:Arial,Helvetica,sans-serif;font-size:19px;line-height:1.31;-webkit-font-smoothing:antialiased}
  a{color:#1d70b8;text-decoration:underline;text-underline-offset:.1em}
  a:hover{color:#003078;text-decoration-thickness:3px}
  a:focus,button:focus-visible{outline:3px solid transparent;color:#0b0c0c;background:#fd0;box-shadow:0 -2px #fd0,0 4px #0b0c0c;text-decoration:none}
  h1,h2,h3,h4{font-weight:700;color:#0b0c0c;margin:0}
  table{border-collapse:collapse;width:100%;font-size:17px}
  th,td{text-align:left;padding:10px 20px 10px 0;border-bottom:1px solid #b1b4b6;vertical-align:top}
  th{font-weight:700}
  button{font-family:inherit;font-size:17px;cursor:pointer}
  .lede{font-size:19px}
  pre{white-space:pre-wrap;word-break:break-word;background:#f3f2f1;border:1px solid #b1b4b6;padding:14px;font-size:14px;font-family:monospace;overflow:auto;max-height:420px}
  .scrolly::-webkit-scrollbar{width:10px;height:10px}.scrolly::-webkit-scrollbar-thumb{background:#b1b4b6}
  @media print{.no-print{display:none}}
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="/config.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/jsx-src" id="appsrc">
const { useState, useEffect, useRef } = React;
const BLUE='#1d70b8', DBLUE='#003078', GREEN='#00703c', DGREEN='#002d18', RED='#d4351c', BLACK='#0b0c0c', MID='#505a5f', LGREY='#f3f2f1', BORDER='#b1b4b6', TEAL='#28a197';
// API base is NEVER hardcoded — resolved at runtime from /config.js (same-origin by default).
const api = (p)=> (typeof window.tributoApi==='function' ? window.tributoApi(p) : p);
const pct = (x)=> Math.round((x||0)*100);
const getJSON = (p)=> fetch(api(p)).then(r=>{ if(!r.ok) throw new Error(p+' '+r.status); return r.json(); });

function Crown(){
  return <svg width="36" height="32" viewBox="0 0 36 32" fill="#fff" style={{marginRight:8,verticalAlign:'middle'}} aria-hidden="true">
    <path d="M11 6.5a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm14 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0ZM18 3a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm10 16c0-2-1-3-2.5-4.5C24 13 22 13 18 13s-6 0-7.5 1.5C9 16 8 17 8 19c0 1 .5 2 2 2.5 0 0 1 .5 1 1.5 0 1.5-1 2-1 2h16s-1-.5-1-2c0-1 1-1.5 1-1.5 1.5-.5 2-1.5 2-2.5Z"/>
    <rect x="6" y="25" width="24" height="2.4"/>
  </svg>;
}
function Tag({tone='blue',children}){
  const c={blue:['#d2e2f1',DBLUE],green:['#cce2d8','#005a30'],red:['#f6d7d2','#942514'],yellow:['#fff7bf','#594d00'],grey:['#eeeeee','#383f43']}[tone]||['#d2e2f1',DBLUE];
  return <strong style={{display:'inline-block',background:c[0],color:c[1],fontSize:14,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',padding:'2px 8px',whiteSpace:'nowrap'}}>{children}</strong>;
}
function GButton({variant='green',children,onClick,disabled,style}){
  const v={green:{bg:GREEN,sh:DGREEN,fg:'#fff'},grey:{bg:LGREY,sh:'#929191',fg:BLACK},blue:{bg:BLUE,sh:DBLUE,fg:'#fff'}}[variant];
  return <button onClick={onClick} disabled={disabled} style={{display:'inline-block',background:v.bg,color:v.fg,border:'2px solid transparent',padding:'8px 12px 7px',fontWeight:700,boxShadow:`0 2px 0 ${v.sh}`,opacity:disabled?.5:1,cursor:disabled?'default':'pointer',...style}}>{children}</button>;
}
function Token({children}){ return <span style={{fontFamily:'monospace',fontSize:14,background:'#fff7bf',padding:'1px 5px',whiteSpace:'nowrap'}}>{children}</span>; }
function redact(text){ return String(text||'').split(/(\[[A-Z0-9_]+\])/).map((p,i)=>/^\[[A-Z0-9_]+\]$/.test(p)?<Token key={i}>{p}</Token>:p); }
function H1({children}){return <h1 style={{fontSize:36,lineHeight:1.09,marginBottom:20}}>{children}</h1>;}
function H2({children,style}){return <h2 style={{fontSize:24,lineHeight:1.2,margin:'0 0 15px',...style}}>{children}</h2>;}
function Rule({size='m'}){return <hr style={{border:0,borderTop:`${size==='l'?2:1}px solid ${BORDER}`,margin:'25px 0'}}/>;}
function Loading({what}){return <p style={{color:MID}}>Loading {what}…</p>;}
function ErrBox({msg}){return <div style={{borderLeft:`5px solid #f47738`,background:'#fef0e6',padding:'14px 18px',margin:'15px 0'}}><strong style={{fontSize:19}}>LLM API not connected</strong><br/><span style={{color:MID,fontSize:16}}>This console is a live preview. Connect a Tributo backend (with a <code>FLOCK_API_KEY</code>) to populate it with real data. Point it via <code>?api=https://your-backend</code> or <code>config.js</code>.</span><br/><span style={{color:MID,fontFamily:'monospace',fontSize:13,marginTop:6,display:'inline-block'}}>endpoint: {window.TRIBUTO_CONFIG.apiBase||'(same origin)'} · {msg}</span></div>;}

function Stat({n,label,status,tone='green'}){
  const sc={green:GREEN,red:RED,grey:MID}[tone];
  return <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{background:BLUE,color:'#fff',padding:'15px 15px 16px',flex:'1 0 auto'}}>
      <span style={{display:'block',fontSize:40,fontWeight:700,lineHeight:1}}>{n}</span>
      <span style={{display:'block',marginTop:8,fontSize:19,lineHeight:1.2}}>{label}</span>
    </div>
    {status&&<div style={{background:sc,color:'#fff',padding:'9px 12px',fontSize:14,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{status}</div>}
  </div>;
}

const TABS=[{k:'overview',label:'Overview'},{k:'federated',label:'Federated learning'},{k:'oversight',label:'Oversight'},{k:'escalations',label:'Escalations'},{k:'settings',label:'Settings'}];

function App(){
  const [tab,setTab]=useState('overview');
  return <div>
    <header>
      <div style={{background:BLACK,borderBottom:`4px solid ${BLUE}`}}>
        <div style={{maxWidth:1100,margin:'0 auto',padding:'8px 20px',display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
          <span style={{display:'flex',alignItems:'center'}}><Crown/><span style={{color:'#fff',fontSize:30,fontWeight:700,letterSpacing:'.02em'}}>GOV.UK</span></span>
          <span style={{color:'#fff',fontSize:19,fontWeight:700,borderLeft:'1px solid #6f777b',paddingLeft:16}}>Tributo Console</span>
          <nav className="no-print" style={{marginLeft:'auto',display:'flex',gap:18,alignItems:'center',fontSize:16}}>
            <a href="/" style={{color:'#fff'}}>Citizen app</a>
            <a href="#" style={{color:'#fff'}}>Documentation</a>
            <span style={{color:'#fff'}}>Operator</span>
          </nav>
        </div>
      </div>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'12px 20px',display:'flex',alignItems:'baseline',gap:14}}>
        <strong style={{fontSize:19}}>HMRC · Self Assessment deployment</strong>
        <span style={{color:MID,fontSize:16}}>region UK-South</span>
      </div>
      <div style={{borderBottom:`1px solid ${BORDER}`}}/>
    </header>

    <div style={{maxWidth:1100,margin:'0 auto',padding:'0 20px',display:'flex',gap:40,alignItems:'flex-start'}}>
      <nav className="no-print" style={{flex:'0 0 200px',paddingTop:30,position:'sticky',top:0}}>
        <ul style={{listStyle:'none',margin:0,padding:0}}>
          {TABS.map(t=>{const on=tab===t.k;return <li key={t.k} style={{marginBottom:2}}>
            <button onClick={()=>setTab(t.k)} style={{display:'block',width:'100%',textAlign:'left',background:on?LGREY:'transparent',border:'none',borderLeft:`4px solid ${on?BLUE:'transparent'}`,padding:'10px 12px',fontSize:19,fontWeight:on?700:400,color:on?BLACK:BLUE,textDecoration:on?'none':'underline',textUnderlineOffset:'.1em'}}>{t.label}</button>
          </li>;})}
        </ul>
      </nav>
      <main className="scrolly" style={{flex:1,minWidth:0,paddingTop:30,paddingBottom:60}}>
        {tab==='overview'&&<Overview/>}
        {tab==='federated'&&<Federated/>}
        {tab==='oversight'&&<Oversight/>}
        {tab==='escalations'&&<Escalations/>}
        {tab==='settings'&&<Settings/>}
      </main>
    </div>

    <footer style={{borderTop:`1px solid ${BORDER}`,background:LGREY,marginTop:20}}>
      <div style={{maxWidth:1100,margin:'0 auto',padding:'25px 20px',fontSize:16,color:MID,display:'flex',gap:20,flexWrap:'wrap',alignItems:'center'}}>
        <a href="#">Accessibility statement</a><a href="#">Privacy</a><a href="#">Algorithmic transparency record</a>
        <span style={{marginLeft:'auto'}}>© Crown copyright</span>
      </div>
    </footer>
  </div>;
}

function Overview(){
  const [m,setM]=useState(null); const [err,setErr]=useState(null);
  useEffect(()=>{ getJSON('/api/metrics').then(setM).catch(e=>setErr(e.message)); },[]);
  if(err) return <div><H1>In the last 7 days</H1><ErrBox msg={err}/></div>;
  if(!m) return <div><H1>In the last 7 days</H1><Loading what="metrics"/></div>;
  const none=m.total_questions===0;
  return <div>
    <H1>Service overview</H1>
    {none&&<div style={{borderLeft:`5px solid ${BORDER}`,padding:'5px 0 5px 20px',margin:'0 0 20px',color:MID}}>No questions answered yet this session. Run a few questions in the <a href="/">citizen app</a>, then return here — these numbers are computed live from the audit log.</div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:20,marginBottom:40,alignItems:'stretch'}}>
      <Stat n={m.total_questions} label="questions answered" status={`${pct(m.grounded_rate)}% grounded`}/>
      <Stat n={`${pct(m.escalation_rate)}%`} label="escalation rate" tone={m.escalation_rate>0.2?'red':'green'} status={m.escalation_rate>0.2?'above target':'within target'}/>
      <Stat n={m.escalated} label="escalated to a human" status={m.escalated?'awaiting review':'none waiting'}/>
      <Stat n={m.redactions_removed} label="PII items redacted" status="100% on-device"/>
    </div>
    <H2>Confidence breakdown</H2>
    <table>
      <thead><tr><th>Confidence label</th><th style={{textAlign:'right'}}>Answers</th></tr></thead>
      <tbody>{Object.keys(m.confidence||{}).length? Object.entries(m.confidence).map(([k,v],i)=>(
        <tr key={i}><td><strong style={{color:k==='grounded'?GREEN:k==='needs-human'?RED:BLACK}}>{k}</strong></td><td style={{textAlign:'right'}}>{v}</td></tr>
      )):<tr><td colSpan="2" style={{color:MID}}>No data yet.</td></tr>}</tbody>
    </table>
  </div>;
}

function Federated(){
  const [state,setState]=useState('idle'); const [prog,setProg]=useState(0); const [data,setData]=useState(null); const [err,setErr]=useState(null);
  const t=useRef([]);
  useEffect(()=>()=>t.current.forEach(clearTimeout),[]);
  const run=async ()=>{
    setState('running'); setProg(0); setErr(null); setData(null);
    let p=0; const tick=()=>{ p=Math.min(95,p+5); setProg(p); if(p<95) t.current.push(setTimeout(tick,90)); };
    tick();
    try{ const d=await (await fetch(api('/api/federated/run'),{method:'POST'})).json(); t.current.forEach(clearTimeout); setProg(100); setData(d); setState('done'); }
    catch(e){ t.current.forEach(clearTimeout); setErr(e.message); setState('idle'); }
  };
  return <div>
    <H1>Federated learning</H1>
    <p className="lede" style={{maxWidth:660,marginTop:0}}>Institutions train on their own caseloads and share only model updates. No raw taxpayer data is ever pooled. This runs a real FedAvg round on the backend.</p>
    <div style={{margin:'20px 0'}}><GButton onClick={run} disabled={state==='running'}>{state==='running'?'Running round…':state==='done'?'Run another round':'Run a federated round'}</GButton></div>
    {err&&<ErrBox msg={err}/>}
    {state!=='idle'&&<div style={{marginBottom:20}}>
      <div style={{height:10,background:LGREY,border:`1px solid ${BORDER}`,marginBottom:6}}><div style={{height:'100%',width:`${prog}%`,background:TEAL,transition:'width .1s linear'}}/></div>
      <p style={{margin:0,fontSize:16,color:MID,fontFamily:'monospace'}}>{state==='running'?`Aggregating model updates (FedAvg)… ${prog}%`:'Aggregation complete'}{data?` · ${data.aggregate_method}`:''}</p>
    </div>}

    {data&&<>
      <H2>Participating nodes</H2>
      <table>
        <thead><tr><th>Institution</th><th>Specialism</th><th style={{textAlign:'right'}}>Local examples</th><th style={{textAlign:'right'}}>Local-only accuracy</th><th style={{textAlign:'right'}}>Raw rows shared</th></tr></thead>
        <tbody>{(data.nodes||[]).map((n,i)=>(
          <tr key={i}><td><strong>{n.name}</strong></td><td>{n.focus}</td><td style={{textAlign:'right'}}>{n.local_examples}</td><td style={{textAlign:'right'}}>{pct(n.local_only_accuracy)}%</td><td style={{textAlign:'right'}}><Tag tone="green">{n.raw_rows_shared}</Tag></td></tr>
        ))}</tbody>
      </table>
      <div style={{borderLeft:`5px solid ${GREEN}`,padding:'10px 0 10px 20px',margin:'25px 0'}}>
        <strong style={{fontSize:19}}>Zero raw rows left the building.</strong><br/>
        <span style={{color:MID}}>{data.feature_space}. Only model updates were shared.</span>
      </div>
      <H2>Held-out accuracy, before and after</H2>
      {[['Best single institution',pct(data.before_accuracy),BORDER],['After federated round',pct(data.after_accuracy),GREEN]].map((r,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:15,marginBottom:12}}>
          <span style={{width:200,fontSize:17}}>{r[0]}</span>
          <div style={{flex:1,height:24,background:LGREY,maxWidth:460}}><div style={{height:'100%',width:`${r[1]}%`,background:r[2],transition:'width .5s'}}/></div>
          <strong style={{width:50}}>{r[1]}%</strong>
        </div>))}
      <p style={{color:GREEN,fontWeight:700,marginTop:6}}>+{data.improvement_points} percentage points over the best single institution · {data.num_rounds} rounds · chance {pct(data.chance_accuracy)}%</p>
      <Rule/>
    </>}

    <H2>How a round works</H2>
    <ol style={{paddingLeft:22,fontSize:17,lineHeight:1.5,maxWidth:680}}>
      {(data?data.timeline:[
        'Each institution trains a local model on its own private, specialised Q&A.',
        'Only model weight updates leave each node — never the raw questions.',
        'The coordinator aggregates the updates with FedAvg.',
        'The federated model is scored on a held-out test set spanning every topic.',
      ]).map((s,i)=><li key={i} style={{marginBottom:8}}>{s}</li>)}
    </ol>
  </div>;
}

function Oversight(){
  const [audit,setAudit]=useState(null); const [atrs,setAtrs]=useState(null); const [card,setCard]=useState(null); const [err,setErr]=useState(null);
  const [show,setShow]=useState(null); // 'atrs' | 'card' | null
  useEffect(()=>{
    getJSON('/api/audit').then(setAudit).catch(e=>setErr(e.message));
    getJSON('/api/transparency').then(setAtrs).catch(()=>{});
    getJSON('/api/model-card').then(setCard).catch(()=>{});
  },[]);
  return <div>
    <H1>Oversight</H1>
    <H2>Audit trail{audit?` (${audit.count})`:''}</H2>
    <p style={{marginTop:0,color:MID,fontSize:16}}>Append-only. Every answer is logged with its provenance. Only the redacted question is stored — never the raw input.</p>
    {err&&<ErrBox msg={err}/>}
    {!audit&&!err&&<Loading what="audit trail"/>}
    {audit&&(audit.count===0
      ? <div style={{borderLeft:`5px solid ${BORDER}`,padding:'5px 0 5px 20px',color:MID}}>No entries yet. Each answer in the <a href="/">citizen app</a> writes one row here.</div>
      : <table>
          <thead><tr><th>Time</th><th>Confidence</th><th>Provider</th><th>Sources</th><th>Redacted question</th></tr></thead>
          <tbody>{audit.entries.map((e,i)=>(
            <tr key={e.id||i}><td style={{fontFamily:'monospace',color:MID,fontSize:14}}>{e.timestamp}</td>
              <td><strong style={{color:e.escalated?RED:GREEN}}>{e.confidence}</strong></td>
              <td>{e.provider}</td><td>{(e.sources||[]).length}</td>
              <td style={{maxWidth:360}}>{redact(e.question_redacted)}</td></tr>
          ))}</tbody>
        </table>)}

    <Rule size="l"/>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:40}}>
      <div>
        <H2>Transparency record</H2>
        {atrs?<><p style={{marginTop:0}}><Tag tone="green">Published</Tag></p>
          <dl style={{margin:0}}>{[['Standard',atrs.standard],['Name',atrs.tier_1?.name],['Phase',atrs.tier_1?.phase],['Region',atrs.tier_1?.region],['Owner',atrs.tier_2?.owner_and_responsibility?.process_owner]].map((r,i)=>(
            <div key={i} style={{padding:'10px 0',borderBottom:`1px solid ${BORDER}`}}><dt style={{color:MID,fontSize:16}}>{r[0]}</dt><dd style={{margin:'2px 0 0',fontWeight:700}}>{r[1]||'—'}</dd></div>
          ))}</dl>
          <p style={{marginTop:12}}><a href="#" onClick={e=>{e.preventDefault();setShow(show==='atrs'?null:'atrs');}}>{show==='atrs'?'Hide':'View'} the full ATRS record</a></p></>
          :<Loading what="ATRS record"/>}
      </div>
      <div>
        <H2>Model card</H2>
        {card?<><p style={{marginTop:0}}><Tag tone="grey">{card.model_details?.base_model||'model'}</Tag></p>
          <dl style={{margin:0}}>
            {[['Name',card.model_details?.name],['Version',card.model_details?.version],['Architecture',card.model_details?.architecture]].map((r,i)=>(
              <div key={i} style={{padding:'10px 0',borderBottom:`1px solid ${BORDER}`}}><dt style={{color:MID,fontSize:16}}>{r[0]}</dt><dd style={{margin:'2px 0 0'}}>{r[1]||'—'}</dd></div>
            ))}
            <div style={{padding:'10px 0'}}><dt style={{color:MID,fontSize:16}}>Out of scope</dt>
              <dd style={{margin:'2px 0 0',color:RED,fontWeight:700}}>{(card.out_of_scope_uses||[]).map((u,i)=><div key={i}>· {u}</div>)}</dd></div>
          </dl>
          <p style={{marginTop:12}}><a href="#" onClick={e=>{e.preventDefault();setShow(show==='card'?null:'card');}}>{show==='card'?'Hide':'View'} the full model card</a></p></>
          :<Loading what="model card"/>}
      </div>
    </div>
    {show==='atrs'&&<pre>{JSON.stringify(atrs,null,2)}</pre>}
    {show==='card'&&<pre>{JSON.stringify(card,null,2)}</pre>}
  </div>;
}

function Escalations(){
  const [list,setList]=useState(null); const [sel,setSel]=useState(null); const [err,setErr]=useState(null);
  useEffect(()=>{ getJSON('/api/escalations').then(d=>{ setList(d.escalations||[]); if(d.escalations&&d.escalations[0]) setSel(d.escalations[0].id); }).catch(e=>setErr(e.message)); },[]);
  if(err) return <div><H1>Escalations</H1><ErrBox msg={err}/></div>;
  if(!list) return <div><H1>Escalations</H1><Loading what="escalation queue"/></div>;
  if(list.length===0) return <div><H1>Escalations</H1><p className="lede" style={{marginTop:0}}>Nothing waiting. When the advisor hands a high-stakes question to a human, it appears here with full redacted context. Try the "Escalation" example in the <a href="/">citizen app</a>.</p></div>;
  const e=list.find(x=>x.id===sel)||list[0];
  const steps=(e.trace&&e.trace.steps)||[];
  return <div>
    <H1>Escalations</H1>
    <p className="lede" style={{marginTop:0}}>Questions the AI handed to a human, with full redacted context. <strong>{list.length} waiting.</strong></p>
    <div style={{display:'grid',gridTemplateColumns:'320px 1fr',gap:40,alignItems:'start'}}>
      <div>
        <H2 style={{fontSize:19}}>Queue</H2>
        <ul style={{listStyle:'none',margin:0,padding:0}}>{list.map(x=>{const on=x.id===sel;return <li key={x.id} style={{borderBottom:`1px solid ${BORDER}`}}>
          <button onClick={()=>setSel(x.id)} style={{display:'block',width:'100%',textAlign:'left',background:on?LGREY:'transparent',border:'none',borderLeft:`4px solid ${on?BLUE:'transparent'}`,padding:'12px'}}>
            <span style={{display:'flex',justifyContent:'space-between'}}><span style={{fontFamily:'monospace',fontSize:13,color:MID}}>{x.id}</span><strong style={{color:RED,fontSize:14}}>{x.confidence}</strong></span>
            <span style={{display:'block',fontWeight:700,fontSize:16,margin:'4px 0 2px',color:on?BLACK:BLUE,textDecoration:on?'none':'underline'}}>{redact(x.question_redacted).slice?x.question_redacted.slice(0,46)+'…':'—'}</span>
            <span style={{display:'block',color:MID,fontSize:13,fontFamily:'monospace'}}>{x.timestamp}</span>
          </button>
        </li>;})}</ul>
      </div>
      <div>
        <div style={{display:'flex',alignItems:'baseline',gap:12,flexWrap:'wrap',marginBottom:8}}><H2 style={{fontSize:24}}>{e.id}</H2><span style={{fontFamily:'monospace',color:MID,fontSize:16}}>{e.timestamp}</span></div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:18}}><Tag tone="red">{e.confidence}</Tag>{(e.redactions||[]).map((r,i)=><Tag key={i} tone="yellow">{r.type} ×{r.count}</Tag>)}</div>

        <h3 style={{fontSize:16,color:MID,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:8}}>Citizen question (redacted)</h3>
        <div style={{borderLeft:`5px solid ${BORDER}`,padding:'5px 0 5px 20px',fontSize:19,marginBottom:20}}>{redact(e.question_redacted)}</div>

        <h3 style={{fontSize:16,color:MID,textTransform:'uppercase',letterSpacing:'.04em',marginBottom:6}}>Reasoning trace {e.trace&&e.trace.planner?`· planner: ${e.trace.planner}`:''}</h3>
        <table style={{marginBottom:20}}>
          <thead><tr><th>Sub-question</th><th style={{textAlign:'right'}}>Coverage</th><th style={{textAlign:'right'}}>Sources</th></tr></thead>
          <tbody>{steps.length?steps.map((s,i)=>(
            <tr key={i}><td>{s.sub_question}</td><td style={{textAlign:'right'}}><strong style={{color:pct(s.coverage)<60?RED:GREEN}}>{pct(s.coverage)}%</strong></td><td style={{textAlign:'right'}}>{(s.sources||[]).length}</td></tr>
          )):<tr><td colSpan="3" style={{color:MID}}>No trace recorded.</td></tr>}</tbody>
        </table>
        <div style={{display:'flex',gap:12}}><GButton>Take this case</GButton><GButton variant="grey">Reassign</GButton></div>
      </div>
    </div>
  </div>;
}

function Settings(){
  const [s,setS]=useState(null); const [err,setErr]=useState(null);
  useEffect(()=>{ getJSON('/api/settings').then(setS).catch(e=>setErr(e.message)); },[]);
  if(err) return <div><H1>Settings</H1><ErrBox msg={err}/></div>;
  if(!s) return <div><H1>Settings</H1><Loading what="settings"/></div>;
  const rows=[
    ['Model',s.model,s.flock_configured?'FLock live inference':'Local fallback (no key set)'],
    ['Redaction policy',s.redactor,'Personal identifiers removed before any text is sent'],
    ['Retrieval backend',s.retriever,`top-k ${s.retrieval_top_k} over the GOV.UK / HMRC corpus`],
    ['Corpus',`${s.corpus_size} sources`,'Curated GOV.UK / HMRC guidance'],
    ['Voice',s.voice_configured?'configured':'not configured',`ElevenLabs ${s.eleven_configured?'on':'off'}`],
  ];
  return <div>
    <H1>Settings</H1>
    <div style={{borderLeft:`5px solid ${BORDER}`,padding:'5px 0 5px 20px',margin:'0 0 25px',color:MID}}>Read-only. In a real deployment these are configured per institution through change control.</div>
    <H2>Deployment configuration</H2>
    <dl style={{margin:0,borderTop:`1px solid ${BORDER}`}}>
      {rows.map((r,i)=>(
        <div key={i} style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:20,padding:'15px 0',borderBottom:`1px solid ${BORDER}`}}>
          <dt style={{fontWeight:700}}>{r[0]}</dt>
          <dd style={{margin:0}}><span style={{fontFamily:'monospace',fontSize:16}}>{String(r[1])}</span><br/><span style={{color:MID,fontSize:16}}>{r[2]}</span></dd>
        </div>
      ))}
    </dl>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  (function(){
    function boot(){
      var src=document.getElementById('appsrc').textContent;
      var out=Babel.transform(src,{presets:[[Babel.availablePresets.react,{runtime:'classic'}]]}).code;
      (0,eval)(out);
    }
    if(document.readyState!=='loading') boot();
    else document.addEventListener('DOMContentLoaded',boot);
  })();
</script>
</body></html>
